# Window size
initial_window_width 90c
initial_window_height 30c
remember_window_size no

# Remove menu bar
hide_window_decorations yes

# Make the background vanish!
background_opacity 0.7

# Set font style
font_family      family="DejaVu Sans Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 14.0

# Cursor style
shell_integration no-cursor
cursor_blink_interval 0.5

# Detect URL
detect_urls yes

# Remove audio bell
enable_audio_bell no

# Minimal Tab bar styling
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template {index}

# Make the scrolling speed faster
touch_scroll_multiplier 5.0

# Creating a new tab with current directory
map ctrl+shift+alt+t new_tab_with_cwd

# Keyboard shortcut for tab switching
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
